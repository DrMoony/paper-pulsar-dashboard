<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Paper Pulsar Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --green:#3fb950; --yellow:#d29922; --red:#f85149; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  h1{margin:0;font-size:20px}
  .updated{color:var(--muted);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;padding:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
  h2{margin:0 0 12px;font-size:15px;color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:500}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .bar{background:#21262d;border-radius:4px;height:6px;overflow:hidden;margin-top:4px}
  .bar>div{height:100%;background:var(--accent);transition:width .3s}
  .bar.complete>div{background:var(--green)}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
  .badge.active{background:rgba(63,185,80,.15);color:var(--green)}
  .badge.done{background:rgba(139,148,158,.2);color:var(--muted)}
  .badge.error{background:rgba(248,81,73,.15);color:var(--red)}
  .badge.warn{background:rgba(210,153,34,.15);color:var(--yellow)}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;font-size:12px}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .pill .dot.off{background:var(--red)}
  .stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #21262d}
  .stat:last-child{border-bottom:0}
  .stat-num{font-variant-numeric:tabular-nums;font-weight:600}
  .muted{color:var(--muted);font-size:12px}
  footer{padding:16px;text-align:center;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <h1>Paper Pulsar Dashboard</h1>
  <div class="updated" id="updated">Loading...</div>
</header>
<div class="grid" id="grid"></div>
<footer>Auto-refresh every 60s · Mac mini push every 30 min · <a href="data.json" style="color:var(--accent)">data.json</a></footer>
<script>
const fmt = n => n==null?'-':n.toLocaleString();
const fmtMin = m => { if(m==null||m<=0)return '-'; const h=Math.floor(m/60), mm=m%60; return h?(h+'h '+mm+'m'):(mm+'m'); };

async function load() {
  const r = await fetch('data.json?t=' + Date.now());
  const d = await r.json();
  document.getElementById('updated').textContent = '마지막 업데이트: ' + d.updated_at_kst;

  const g = document.getElementById('grid');
  g.innerHTML = '';

  const sys = d.system || {};
  const sysCard = card('System', `
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      <span class="pill"><span class="dot${sys.uvicorn_running?'':' off'}"></span>uvicorn</span>
      <span class="pill"><span class="dot${sys.mlx_lm_running?'':' off'}"></span>mlx_lm.server</span>
    </div>
    <div class="stat"><span>Disk</span><span class="stat-num">${sys.disk?(sys.disk.used+'/'+sys.disk.total+' ('+sys.disk.pct+')'):'-'}</span></div>
  `);
  g.appendChild(sysCard);

  const batches = d.codex_batches || [];
  const active = batches.filter(b => b.active);
  const recent = batches.filter(b => !b.active && b.pct > 0).sort((a,b)=>parseInt(b.name.slice(1))-parseInt(a.name.slice(1))).slice(0,8);

  if (active.length) {
    const rows = active.map(b => `
      <tr><td><strong>${b.name}</strong> <span class="badge active">running</span></td>
      <td class="num">${fmt(b.done)}/${fmt(b.total)}<div class="bar"><div style="width:${b.pct}%"></div></div><div class="muted">${b.pct}%</div></td>
      <td class="num">${b.speed_sec?b.speed_sec.toFixed(1)+'s/p':'-'}</td>
      <td class="num">${fmtMin(b.eta_min)}</td>
      <td class="num">${b.errors||0}${b.timeouts?(' <span class="muted">('+b.timeouts+'t)</span>'):''}</td></tr>`).join('');
    g.appendChild(card('Codex Batches (active, '+active.length+')', `
      <table><tr><th>Batch</th><th class="num">Progress</th><th class="num">Speed</th><th class="num">ETA</th><th class="num">Errors</th></tr>${rows}</table>`));
  }

  if (recent.length) {
    const rows = recent.map(b => `
      <tr><td><strong>${b.name}</strong> <span class="badge ${b.pct>=99?'done':'warn'}">${b.pct>=99?'done':'paused'}</span></td>
      <td class="num">${fmt(b.done)}/${fmt(b.total)}</td>
      <td class="num">${b.pct}%</td>
      <td class="num">${b.errors||0}${b.timeouts?(' <span class="muted">('+b.timeouts+'t)</span>'):''}</td></tr>`).join('');
    g.appendChild(card('Recent Codex Batches', `
      <table><tr><th>Batch</th><th class="num">Done</th><th class="num">%</th><th class="num">Errors</th></tr>${rows}</table>`));
  }

  const fs = d.firestore || {};
  const ss = fs.status || {};
  const cs = fs.categorySource || {};
  const total = Object.values(ss).filter(v=>v>=0).reduce((a,b)=>a+b,0);
  const statusRows = ['analyzed','pending','queued_codex','metadata','skipped','failed','summarizing'].map(k => {
    const v = ss[k];
    const pct = v>=0&&total?(v/total*100).toFixed(1):'-';
    const cls = v<0?'error':k==='failed'&&v>0?'error':k==='pending'&&v>1000?'warn':'';
    return '<div class="stat"><span>'+k+(cls?(' <span class="badge '+cls+'">'+cls+'</span>'):'')+'</span><span class="stat-num">'+fmt(v)+' <span class="muted">('+pct+'%)</span></span></div>';
  }).join('');
  g.appendChild(card('Firestore Status', statusRows));

  const csRows = Object.entries(cs).map(([k,v]) => '<div class="stat"><span>'+k+'</span><span class="stat-num">'+fmt(v)+'</span></div>').join('');
  g.appendChild(card('categorySource', csRows + '<div class="stat" style="margin-top:8px;border-top:1px solid var(--border);padding-top:12px"><span>categoryReviewNeeded</span><span class="stat-num">'+fmt(fs.reviewNeeded)+'</span></div>'));

  const runs = (d.daily_runs || []).slice().reverse();
  if (runs.length) {
    const rows = runs.map(r => `
      <tr><td>${r.time}</td>
      <td class="num">${r.analyzed||0}</td>
      <td class="num">${r.skipped||0}</td>
      <td class="num">${r.retried||0}</td>
      <td class="num">${r.failed||0}</td></tr>`).join('');
    g.appendChild(card('Daily MLX Pipeline (last 10 runs)', `
      <table><tr><th>Time</th><th class="num">analyzed</th><th class="num">skipped</th><th class="num">retried</th><th class="num">failed</th></tr>${rows}</table>`));
  } else {
    g.appendChild(card('Daily MLX Pipeline', '<div class="muted">아직 기록 없음 (다음 cron 03:30 KST)</div>'));
  }
}

function card(title, html) {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = '<h2>'+title+'</h2>'+html;
  return div;
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
